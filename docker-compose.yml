version: "3.9"

services:
  # ---- Redis cache ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---- RouteLLM Gateway ----
  gateway:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./router/checkpoints:/app/router/checkpoints
    command: >
      uvicorn gateway.main:app
      --host 0.0.0.0
      --port 8000
      --log-level info

volumes:
  redis_data:
